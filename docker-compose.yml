version: "3.9"

services:
  python-agents:
    build:
      context: ./python_agents
      dockerfile: Dockerfile
    container_name: finity-python-agents
    ports:
      - "8000:8000"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finity-server
    environment:
      PORT: 4000
      JWT_SECRET: finity-local-secret
      PYTHON_SERVICE_URL: http://python-agents:8000/run
      QUERY_LIMIT_PER_HOUR: 10
    ports:
      - "4000:4000"
    depends_on:
      - python-agents

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: finity-client
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - server
