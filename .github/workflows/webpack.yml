name: Client Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      working-directory: client
      run: |
        npm ci

    - name: Build client
      working-directory: client
      run: |
        npm run build
